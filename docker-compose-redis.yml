services:
  redis:
    image: redis:7-alpine
    container_name: mopl-redis
    ports:
      - "6379:6379"
    environment:
      - TZ=Asia/Seoul
    command: redis-server --save 60 1 --loglevel warning --requirepass admin1234 --logfile /var/log/redis/redis-server.log
    volumes:
      - redis_data:/data
      - ./redis/logs:/var/log/redis
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "admin1234", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data: