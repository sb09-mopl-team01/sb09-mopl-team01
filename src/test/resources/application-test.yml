spring:
  datasource:
    url: jdbc:h2:mem:mopl-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  batch:
    jdbc:
      initialize-schema: always
  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
